        // LOGICA DE GUARDADO (LOCALSTORAGE)
        function guardarProgreso() {
            const aprobados = ramos.filter(r => r.estado === 'aprobado').map(r => r.id);
            localStorage.setItem('malla_tm_progreso', JSON.stringify(aprobados));
        }

        function cargarProgreso() {
            const guardado = localStorage.getItem('malla_tm_progreso');
            if (guardado) {
                const aprobados = JSON.parse(guardado);
                aprobados.forEach(id => {
                    const ramo = ramos.find(r => r.id === id);
                    if (ramo) ramo.estado = 'aprobado';
                });
            }
        }

        // DOM e Interfaz
        function inicializarFiltros() {
            const contenedor = document.getElementById('contenedor-filtros');
            contenedor.innerHTML = `<button onclick="setFiltro('Todos')" id="filter-Todos" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium transition-colors bg-slate-200 dark:bg-slate-700 text-slate-800 dark:text-white">Todos</button>`;
            
            Object.keys(AREAS).forEach(area => {
                const colorBg = AREAS[area].bg.replace('bg-[', '').replace(']', '');
                const safeId = area.replace(/[^a-zA-Z0-9]/g, ''); 
                contenedor.innerHTML += `
                    <button onclick="setFiltro('${area}')" id="filter-${safeId}" 
                        class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium transition-colors border bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300"
                        style="border-color: ${colorBg}">
                        ${AREAS[area].text}
                    </button>
                `;
            });
        }

        function setFiltro(area) {
            filtroAreaActual = area;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-slate-200', 'dark:bg-slate-700', 'ring-2', 'ring-indigo-500');
                const safeId = area.replace(/[^a-zA-Z0-9]/g, '');
                if (btn.id === `filter-${safeId}` || (area === 'Todos' && btn.id === 'filter-Todos')) {
                    btn.classList.add('ring-2', 'ring-indigo-500');
                }
            });
            renderizarMalla();
        }

        function toggleFiltroDisponibles() {
            mostrarSoloDisponibles = !mostrarSoloDisponibles;
            const btn = document.getElementById('btn-disponibles');
            if (mostrarSoloDisponibles) {
                btn.classList.replace('bg-indigo-100', 'bg-indigo-600');
                btn.classList.replace('text-indigo-700', 'text-white');
                btn.classList.replace('dark:bg-slate-700', 'dark:bg-indigo-600');
                btn.classList.replace('dark:text-indigo-300', 'dark:text-white');
            } else {
                btn.classList.replace('bg-indigo-600', 'bg-indigo-100');
                btn.classList.replace('text-white', 'text-indigo-700');
                btn.classList.replace('dark:bg-indigo-600', 'dark:bg-slate-700');
                btn.classList.replace('dark:text-white', 'dark:text-indigo-300');
            }
            renderizarMalla();
        }

        document.getElementById('buscador').addEventListener('input', (e) => {
            renderizarMalla(e.target.value.toLowerCase());

        function renderizarMalla(searchTerm = "") {

            contenedor.innerHTML = '';

            for (let i = 1; i <= 10; i++) {

                let columnaHtml = `

                        <h2 class="text-center text-lg font-bold text-indigo-600 dark:text-indigo-400 mb-4 pb-2 border-b border-slate-100 dark:border-slate-700">
                            ${i}º Semestre
                        </h2>
                        <div class="flex flex-col gap-4">
                `;
                
                ramosSemestre.forEach(ramo => {
                    evaluarBloqueos(ramo);

                    let ocultar = false;
                    if (filtroAreaActual !== "Todos" && ramo.area !== filtroAreaActual) ocultar = true;
                    if (mostrarSoloDisponibles && ramo.estado !== "pendiente") ocultar = true;
                    if (searchTerm && !ramo.nombre.toLowerCase().includes(searchTerm) && !ramo.sigla.toLowerCase().includes(searchTerm)) ocultar = true;

                    if (ocultar) return;

                    let bgClass = "bg-estado-disponible dark:bg-estado-disponible-dark text-slate-800 dark:text-slate-100"; 
                    let cursor = "cursor-pointer";
                    let stateIcon = "";

                    if (ramo.estado === 'bloqueado') { 
                        bgClass = "bg-estado-bloqueado dark:bg-estado-bloqueado-dark text-slate-400 dark:text-slate-500 opacity-60";
                        cursor = "cursor-not-allowed";
                    } else if (ramo.estado === 'aprobado') { 
                        bgClass = "bg-estado-aprobado dark:bg-estado-aprobado-dark text-slate-800 dark:text-slate-100";
                        stateIcon = `<i class="ph-fill ph-check-circle text-green-600 dark:text-green-400 absolute top-2 right-2 text-xl"></i>`;
                    }

                    const areaConfig = AREAS[ramo.area];
                    const borderColor = areaConfig ? areaConfig.bg.replace('bg-[', '').replace(']', '') : '#ccc';

                    columnaHtml += `
                        <div onclick="cambiarEstado('${ramo.id}')" 
                             class="ramo-card relative flex flex-col rounded-lg border border-slate-200 dark:border-slate-700 overflow-hidden ${bgClass} ${cursor}">
                            
                            <div class="absolute left-0 top-0 bottom-0 w-2" style="background-color: ${borderColor};"></div>
                            ${stateIcon}

                            <div class="p-4 pl-5">
                                <h3 class="font-semibold text-sm leading-tight mb-2 pr-4">
                                    ${ramo.nombre} <span class="text-base ml-1">${ramo.iconos}</span>
                                </h3>
                                
                                <div class="border-t border-dashed border-slate-300 dark:border-slate-600 my-2"></div>
                                
                                <div class="flex justify-start items-center text-xs font-medium opacity-80">
                                    <span>${ramo.sigla}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });

                columnaHtml += `</div></div>`;
                contenedor.innerHTML += columnaHtml;
            }

            actualizarProgreso();
        }

        function evaluarBloqueos(ramo) {
            if (ramo.pre.length === 0 && ramo.estado === 'bloqueado') {
                ramo.estado = 'pendiente';
                return;
            }

            let todosAprobados = true;
            ramo.pre.forEach(reqId => {
                const reqRamo = ramos.find(r => r.id === reqId);
                if (reqRamo && reqRamo.estado !== 'aprobado') {
                    todosAprobados = false;
                }
            });

            if (ramo.estado === 'bloqueado' && todosAprobados) {
                ramo.estado = 'pendiente';
            } else if (ramo.estado !== 'bloqueado' && !todosAprobados) {
                ramo.estado = 'bloqueado';
                desaprobarHaciaAdelante(ramo.id);
            }
        }

        function desaprobarHaciaAdelante(id) {
            ramos.forEach(r => {
                if (r.pre.includes(id) && r.estado === 'aprobado') {
                    r.estado = 'bloqueado';
                    desaprobarHaciaAdelante(r.id); 
                }
            });
        }

        function cambiarEstado(id) {
            const ramo = ramos.find(r => r.id === id);
            if (ramo.estado === 'bloqueado') return; 

            if (ramo.estado === 'pendiente') {
                ramo.estado = 'aprobado';
            } else if (ramo.estado === 'aprobado') {
                ramo.estado = 'pendiente';
            }

            renderizarMalla(); 
            guardarProgreso(); // Se guarda el cambio localmente
        }

        function actualizarProgreso() {
            const totalRamos = ramos.length;
            const ramosAprobados = ramos.filter(r => r.estado === 'aprobado');
            const cantidadAprobados = ramosAprobados.length;
            
            const porcentaje = totalRamos === 0 ? 0 : Math.round((cantidadAprobados / totalRamos) * 100);

            document.getElementById('stat-aprobados').innerText = cantidadAprobados;
            document.getElementById('stat-progreso').innerText = `${porcentaje}%`;

            const barraFill = document.getElementById('progress-bar-fill');
            const barraText = document.getElementById('progress-bar-text');
            barraFill.style.width = `${porcentaje}%`;
            barraText.innerText = `${porcentaje}%`;
        }

        function resetMalla() {
            // Confirmación extra por si el usuario presiona por error
            if(confirm("¿Estás seguro de que quieres reiniciar todo tu progreso?")) {
                ramos.forEach(r => {
                    if (r.pre.length > 0) r.estado = 'bloqueado';
                    else r.estado = 'pendiente';
                });
                renderizarMalla();
                guardarProgreso(); // Se guarda la malla en blanco
            }
        }

        const themeToggle = document.getElementById('theme-toggle');
        const htmlClassList = document.documentElement.classList;

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            htmlClassList.add('dark');
            themeToggle.checked = true;
        } else {
            htmlClassList.remove('dark');
            themeToggle.checked = false;
        }

        themeToggle.addEventListener('change', (e) => {
            if (e.target.checked) {
                htmlClassList.add('dark');
                localStorage.theme = 'dark';
            } else {
                htmlClassList.remove('dark');
                localStorage.theme = 'light';
            }
        });

        // Iniciar App
        window.onload = () => {
            cargarProgreso(); // Primero cargamos lo guardado
            inicializarFiltros();
            renderizarMalla();
        };
    </script>
</body>
</html>
